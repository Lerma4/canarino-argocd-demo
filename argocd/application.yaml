apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: canarino
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Lerma4/canarino-argocd-demo.git
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: canarino
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
